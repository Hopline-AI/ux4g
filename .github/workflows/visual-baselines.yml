name: Update visual baselines

# Manually run to (re)record the Linux screenshot baselines inside the pinned
# Playwright container and commit them back to the branch. After the first run,
# the screenshot tests can be promoted to a blocking CI check.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory '*'
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npx playwright test -c visual/playwright.config.ts --update-snapshots
      - name: Commit Linux baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add visual/tests/**/*-linux.png || true
          git commit -m "test(visual): record Linux screenshot baselines" || echo "no baseline changes"
          git push
