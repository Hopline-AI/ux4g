name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build, typecheck, unit tests, registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm registry:build

  visual-design-specs:
    name: Visual design-spec proofs (OS-independent)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Only the computed-style proofs (colors, radii, focus ring, borders) —
      # these are deterministic across OS. Pixel screenshots run via
      # visual-baselines.yml once Linux baselines are committed.
      - run: npx playwright test -c visual/playwright.config.ts design-specs
      # Theming proofs: switch palettes and assert the real components (not just
      # the site chrome) re-theme. Runs against the built docs site.
      - run: npx playwright test -c visual/playwright.docs.config.ts
